<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Biomedical QA Evaluation</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    h2 { color: #222; }
    input[type="text"] {
      width: 100%; padding: 10px; font-size: 16px;
    }
    button {
      width: 100%; padding: 10px; font-size: 16px; background: #444; color: white; border: none; cursor: pointer;
    }
    .output, .explanation {
      margin-top: 20px; padding: 10px; background: white; border: 1px solid #ccc;
    }
    .token {
      display: inline-block; margin: 2px; padding: 5px 8px; border-radius: 4px; color: white;
    }
  </style>
</head>
<body>
  <h2>Ask a Biomedical Question</h2>
  <input type="text" id="question" placeholder="Ask your question">
  <button onclick="submitQuestion()">Submit</button>
  <button onclick="explainQuestion()">Explain</button>

  <div class="output" id="answer">Answer will appear here...</div>
  <div class="explanation" id="explanation">Explanation will appear here...</div>

  <script>
    async function submitQuestion() {
      const question = document.getElementById("question").value;
      const res = await fetch("/answer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      document.getElementById("answer").innerText = data.answer;
    }

    async function explainQuestion() {
      const question = document.getElementById("question").value;
      const res = await fetch("/explain", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();

      const explanationDiv = document.getElementById("explanation");
      explanationDiv.innerHTML = "";
      for (let [token, weight] of data.explanation) {
        const span = document.createElement("span");
        span.className = "token";
        const intensity = Math.min(Math.abs(weight) * 5, 1);
        const color = weight > 0 ? `rgba(76, 175, 80, ${intensity})` : `rgba(244, 67, 54, ${intensity})`;
        span.style.backgroundColor = color;
        span.innerText = token + ` (${weight.toFixed(2)})`;
        explanationDiv.appendChild(span);
      }
    }
  </script>
</body>
</html>
