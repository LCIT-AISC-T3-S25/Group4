name: Test Branch CI/CD

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Deployment/CaseStudy1/requirements.txt
          pip install pytest

      - name: Test GRU API
        run: |
          python -m pytest -v Deployment/CaseStudy1/test_gru.py

      - name: Test LSTM API
        run: |
          python -m pytest -v Deployment/CaseStudy1/test_lstm.py

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        model: [gru, lstm]

    steps:
      - uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          cd Deployment/CaseStudy1
          docker build -t ${{ matrix.model }}-service -f dockerfile.${{ matrix.model }} .

      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GHCR
        run: |
          docker tag ${{ matrix.model }}-service ghcr.io/${{ github.repository }}/${{ matrix.model }}-service:latest
          docker push ghcr.io/${{ github.repository }}/${{ matrix.model }}-service:latest
