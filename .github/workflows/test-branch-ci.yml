name: Test Branch CI/CD

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  validate-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Check each folder for app.py and Dockerfile
        run: |
          echo "Scanning subdirectories for app.py and Dockerfile..."
          found_valid=0

          for dir in */ ; do
            if [[ -f "$dir/app.py" && -f "$dir/Dockerfile" ]]; then
              echo "Found both files in $dir"
              found_valid=1
              break
            fi
          done

          if [[ $found_valid -eq 1 ]]; then
            echo "Test Passed: At least one folder contains both app.py and Dockerfile."
          else
            echo "Test Failed: No folder contains both app.py and Dockerfile."
            exit 1
          fi
