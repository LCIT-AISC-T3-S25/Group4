name: Repository Structure and Branch Policy Check

on:
  push:
    branches: ["dev", "test"]
  pull_request:
    branches: ["dev", "test"]

jobs:
  check-structure-and-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check directory structure
        run: |
          ROOT_DIR="."
          REQUIRED_DIRS=("Deployment/CaseStudy1" "NLP/CaseStudy1")
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$ROOT_DIR/$dir" ]; then
              echo "Missing required directory: $dir"
              exit 1
            fi
          done

      - name: Check branch-specific content
        run: |
          CURRENT_BRANCH=$(echo $GITHUB_REF | awk -F'/' '{print $NF}')
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$CURRENT_BRANCH" = "dev" ]; then
            if ls Deployment/CaseStudy1/* 2>/dev/null | grep -q ".py\|Dockerfile"; then
              echo "Error: Dev branch contains deployment code."
              exit 1
            fi
          elif [ "$CURRENT_BRANCH" = "test" ]; then
            if ls NLP/CaseStudy1/* 2>/dev/null | grep -q ".ipynb\|model\|.pkl"; then
              echo "Error: Test branch contains model-building artifacts."
              exit 1
            fi
          fi

      - name: Check for peer review before merge to test
        if: github.event_name == 'pull_request' && github.base_ref == 'test'
        run: |
          REVIEWS_URL="https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews"
          REVIEWS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" $REVIEWS_URL)
          if [[ $REVIEWS != *"APPROVED"* ]]; then
            echo "Error: No peer review found for this PR."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v3
